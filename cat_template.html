<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ネコの紹介</title>
</head>
<body>
    <div class="content">
    <link rel="stylesheet" href="CSS/style_temp.css">

    <h1>ネコ</h1>
    <h2>体が柔らかい</h2>
    <p>ネコはとても体が柔らかい動物で、ネット上では「ネコは液体だ」というジョークも有名です。</p>
    <p>そしてそれを可能にする骨格と、優れた平衡感覚によって高い運動能力を持っています。</p>
    <h2>肉球</h2>
    <p>ネコの肉球は高い所からの衝撃を吸収するだけでなく、歩行時の足音を消す優れたクッションにもなります。</p>
    <P>犬の肉球とは異なり皮膚が薄く神経が集中しているため、地面のわずかな振動や温度を敏感に察知するセンサーとしての役割も持ちます。</P>
    </div>

    <div class="slider">
    <div class="slides">
        <script src="js/script.js"></script>

        <div class="slide">
            <img src="images/cat_images/basic.jpg" alt="" class="">
        </div>

        <div class="slide">
            <img src="images/cat_images/high_place.jpg" alt="" class="">
        </div>

        <div class="slide">
            <img src="images/cat_images/nikukyuu.jpg" alt="" class="">
        </div>
    </div>
     <!-- 左右ボタン -->
    <button class="prev" onclick="prevSlide()">←</button>
    <button class="next" onclick="nextSlide()">→</button>

    </div>
    <!-- 下の点 -->
    <div class="dots">
        <span class="dot active" onclick="moveSlide(0)"></span>
        <span class="dot" onclick="moveSlide(1)"></span>
        <span class="dot" onclick="moveSlide(2)"></span>
    </div>
</body>
</html>
